<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IncuBrix - Creator Growth Platform</title>
  <meta name="description" content="Empowering creators to grow, scale, and thrive across all social platforms." />
  
  <!-- Open Graph -->
  <meta property="og:title" content="IncuBrix - Creator Growth Platform" />
  <meta property="og:description" content="The ultimate toolkit for modern content creators." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/logo.jpeg" />
  
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
  <style>
    html, body {
      background-color: #030616; /* Darkest theme background */
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #030616;
      z-index: 9999;
    }
    .loader-text {
      margin-top: 20px;
      color: #94a3b8;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(6, 182, 212, 0.1);
      border-radius: 50%;
      border-top-color: #06b6d4;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="bg-background antialiased">
  <div id="root">
    <div id="initial-loader">
      <div class="spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
