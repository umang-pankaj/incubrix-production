<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google OAuth Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.authenticated {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.unauthenticated {
            background: #fff3e0;
            color: #f57c00;
        }

        .user-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-info img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.logout {
            background: #f44336;
            margin-top: 10px;
        }

        button.logout:hover {
            background: #d32f2f;
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.4);
        }

        .endpoint-info {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .endpoint-info h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .endpoint-info code {
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .endpoint-info ul {
            list-style: none;
            margin-top: 10px;
        }

        .endpoint-info li {
            padding: 8px 0;
            color: #555;
            font-size: 14px;
        }

        .json-output {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Google OAuth Test</h1>
        <p class="subtitle">Test your authentication backend</p>

        <div id="status" class="status loading">
            Checking authentication status...
        </div>

        <div id="content"></div>

        <div class="endpoint-info">
            <h3>Available Endpoints</h3>
            <ul>
                <li><code>GET /auth/google</code> - Start OAuth flow</li>
                <li><code>GET /auth/me</code> - Get current user</li>
                <li><code>POST /auth/logout</code> - Logout</li>
                <li><code>GET /health</code> - Health check</li>
            </ul>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:3001';

        // Check URL params for auth status
        const urlParams = new URLSearchParams(window.location.search);
        const authStatus = urlParams.get('auth');

        if (authStatus === 'success') {
            showMessage('✅ Login successful!', 'authenticated');
            // Clear URL params
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (authStatus === 'failed') {
            showMessage('❌ Login failed. Please try again.', 'unauthenticated');
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Check authentication status
        checkAuth();

        async function checkAuth() {
            try {
                const response = await fetch(`${BACKEND_URL}/auth/me`, {
                    credentials: 'include',
                });

                if (response.ok) {
                    const data = await response.json();
                    displayAuthenticatedUser(data.user);
                } else {
                    displayLoginButton();
                }
            } catch (error) {
                console.error('Error checking auth:', error);
                showMessage('❌ Failed to connect to backend. Is the server running?', 'unauthenticated');
                displayLoginButton();
            }
        }

        function showMessage(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function displayLoginButton() {
            showMessage('🔓 Not authenticated', 'unauthenticated');
            document.getElementById('content').innerHTML = `
                <button onclick="login()">
                    🚀 Sign in with Google
                </button>
            `;
        }

        function displayAuthenticatedUser(user) {
            showMessage('✅ Authenticated', 'authenticated');
            document.getElementById('content').innerHTML = `
                <div class="user-info">
                    <img src="${user.picture}" alt="${user.name}">
                    <h3>${user.name}</h3>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>ID:</strong> ${user.id}</p>
                    <p><strong>Provider:</strong> ${user.provider}</p>
                </div>
                <button class="logout" onclick="logout()">
                    🚪 Logout
                </button>
                <div class="json-output">
                    <strong>User Object:</strong><br>
                    ${JSON.stringify(user, null, 2)}
                </div>
            `;
        }

        function login() {
            window.location.href = `${BACKEND_URL}/auth/google`;
        }

        async function logout() {
            try {
                const response = await fetch(`${BACKEND_URL}/auth/logout`, {
                    method: 'POST',
                    credentials: 'include',
                });

                if (response.ok) {
                    showMessage('👋 Logged out successfully', 'unauthenticated');
                    displayLoginButton();
                } else {
                    alert('Logout failed');
                }
            } catch (error) {
                console.error('Error during logout:', error);
                alert('Logout failed. Please try again.');
            }
        }
    </script>
</body>
</html>
